<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300&display=swap');
        *{
            user-select: none;
        }
        .a{
            background: linear-gradient(125deg, #0037ff, #43c5ff) fixed;
            height: 100%;
            margin: 0;
            color: white;
        }
        .b{
            background: #000 fixed;
            color: lightgray;
        }

        .title{
            display: grid;
            align-self: center;
            justify-content: center;
            margin-top: 30vh;
            text-align: center;
            font-size: 50px;
            font-family: 'Open Sans', sans-serif;
        }
        .ms{
            font-size: 15px;
        }
        .b .progress{
            background: gray;
        }

        .progress .determinate {
            background: #0037ff;
        }
        .progress{
            background: #43c5ff;
        }
    </style>

    <script>
        function startTimer(){
            setInterval(timer, 1)
        }

        function timer(){
            let now = new Date();
            let end = new Date(2022, 6, 7)
            let from = new Date(2021, 6, 7)
            if (now.getHours() > 19){
                document.body.classList.add("b");
            }

            let date = end.getTime() - now.getTime();
            let obj = new Date();
            obj.setTime(date)

            document.getElementById('ms').innerText = obj.getTime() + "";
            document.getElementById('normal').innerText = getStr(obj);
            proBar(from, end);
        }

        /**
         *
         * @param from{Date}
         * @param end{Date}
         */
        function proBar(from, end){
            let now = new Date();
            let a = now.getTime() - from.getTime();
            let b = end.getTime() - from.getTime();
            let c = 0;
            if (now.getTime() > from.getTime()){
                c = a * 100 / b;
            }
            document.getElementById('pr').style.width = c + "%";
        }

        /**
         *
         * @param date {Date}
         */
        function getStr(date){
            let days = Math.round(date.getTime()/(864e+5));
            let hours = nrmlz(date.getHours());
            let minutes = nrmlz(date.getMinutes());
            let seconds = nrmlz(date.getSeconds());
            let ms = date.getMilliseconds();

            if (ms === 0){
                ms = "000";
            } else if (ms < 10){
                ms = "00" + ms;
            } else if (ms < 100){
                ms = "0" + ms;
            }
            return `${days}:${hours}:${minutes}:${seconds}.${ms}`
        }

        /**
         *
         * @param nm {Number}
         */
        function nrmlz(nm){
            return nm < 10 ? "0" + nm  : nm;
        }
    </script>
    <meta charset="UTF-8">
    <title>Время до свободы</title>
</head>
<body class="a">
<div class="title">
    До возвращения Игоря из армии осталось:
    <div id="normal"></div>
    <div id="ms" class="ms"></div>
    <div class="progress">
        <div id="pr" class="determinate" style="width: 0%"></div>
    </div>
</div>
</body>
<script>startTimer()</script>
</html>
